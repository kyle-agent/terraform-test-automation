# Excluded resources — split OUT of the testable funnel denominator (the same
# way parent-arg-only data sources are) and shown greyed-out, in their own
# section, on the dashboard. These are NOT provider/fixture defects — excluding
# them keeps "100% coverage" meaning 100% of what is actually testable.
#
# Keyed by resource short name (without the samsungcloudplatformv2_ prefix).
# reason:
#   license      -> requires a vendor license the account does not hold; create
#                   never returns 2xx (functional validation is owner-license-gated).
#   no-capacity  -> physical hardware / service entitlement / cost not available
#                   on the test account (not a license, not a code defect).
#   deprecated   -> service is slated for deprecation/retirement; not worth
#                   carrying as an active coverage target.
#   cost         -> creating it is a real financial commitment (e.g. a multi-year
#                   reservation), not a cheap ephemeral resource.
#   out-of-scope -> intentionally not a coverage target (per request).
#   cross-account-> exercising it structurally requires a SECOND account the
#                   single regression key cannot provide; same-account create
#                   either auto-completes or the API rejects the action.
# Evidence provenance: api-test-automation knowledge/formal/services/* (2026-06).

billing_planned_compute:
  reason: cost
  detail: >-
    Create commits a real 1-year compute RESERVATION (financial commitment), not
    a cheap ephemeral resource. Provider #78 (contract_type OneOf 01/03/05) is
    fixed, but apply is intentionally not exercised. Excluded per request.

configinspection:
  reason: out-of-scope
  detail: "Intentionally not a coverage target (excluded per request)."

cloudmonitoring_event_policy:
  reason: deprecated
  detail: >-
    CloudMonitoring is slated for deprecation; not carried as an active coverage
    target. (A partial provider #54 types.* fix is committed but the service is
    being retired, so the remaining raw-typed fields are not worth completing.)

baremetal_baremetal:
  reason: no-capacity
  detail: >-
    Physical bare-metal server. Test key is not entitled (reaper gets 403 on the
    baremetal service) and the dedicated account has no BM hardware capacity.

baremetal_blockstorage_volume:
  reason: no-capacity
  detail: >-
    Requires a live Bare Metal server to attach to (선행 서비스: Bare Metal Server);
    transitively unprovisionable because baremetal_baremetal is.

multinodegpucluster_gpunode:
  reason: no-capacity
  detail: >-
    Bare-metal GPU servers (8×H100/B300), minimum 2 nodes at creation. Gated by
    GPU hardware capacity + billing cost on the test account, not a license.

sqlserver_cluster:
  reason: license
  detail: >-
    Microsoft SQL Server is a license-gated engine the account does not hold a
    license for; cluster create never returns 2xx (api-test: reachability-only,
    license-gated). Functional validation is owner-license-gated.

vertica_cluster:
  reason: license
  detail: >-
    Vertica is license-gated (VerticaClusterCreateRequest carries a license field)
    and the account holds no license (api-test: reachability-only, license-gated).

vpc_vpc_peering_approval:
  reason: cross-account
  detail: >-
    The peering approval action is structurally untestable from a single account.
    Same-account VPC peering auto-activates (CREATING -> ACTIVE), and the platform
    rejects the approval call with 400 "Approval is not required for Same Account
    VPC peering" (peering probe run 27401023616). Exercising CREATE_APPROVE/etc.
    requires the approver VPC to live in a DIFFERENT account, which the single
    regression key cannot provide. The provider resource + fixture are otherwise
    correct (terraform validate passes). NOT a provider/fixture defect.
