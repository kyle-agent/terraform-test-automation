# cost_tiers.yaml — cost/status classification for every scenario under scenarios/.
#
# Schema (one entry per scenario directory):
#   <scenario>:
#     cost:   free | cheap | heavy
#     status: green | broken | untested
#     issues: [ "#NN", ... ]   # tracking issues for broken scenarios
#
# Cost heuristic:
#   HEAVY = managed DB *_cluster (mysql/postgresql/mariadb/sqlserver/epas/vertica/
#           cachestore/searchengine), ske_*, baremetal*, billing_planned_compute,
#           gslb, eventstreams, directconnect*, large loadbalancer_*.
#   CHEAP = vpc*, security*/securitygroup*, iam*, dns*, servicewatch*,
#           virtualserver_keypair/image/volume/server_group, filestorage*, budget,
#           resourcemanager, network_logging, certificate*, firewall*, loggingaudit.
#   FREE  = pure data-only / no-create scenarios.
#
# status/issues seeded from maintainer's known-green and known-broken lists; all
# others marked untested until a matrix run proves them out.
#
# The cost-tiered regression lane (scripts/select_regression.sh + regression.yml)
# selects status==green AND cost in {free,cheap}.

