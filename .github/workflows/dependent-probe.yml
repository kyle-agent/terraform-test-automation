name: Dependent Probe

# Exercises scenarios that need a pre-existing VPC / Subnet / Security Group by
# creating those prerequisites once (bootstrap/), exporting their ids as TF_VAR_*,
# running the capability matrix over the dependent set, then always tearing the
# prerequisites down. This unlocks ~network dependent resources without TEST_*
# secrets. Triggered by pushing to bootstrap/ or this workflow on a claude/** branch.

on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'bootstrap/**'
      - 'scenarios/**'
      - '.github/workflows/dependent-probe.yml'
  workflow_dispatch:
    inputs:
      scenarios:
        description: 'Comma-separated dependent scenarios to run'
        required: false
        default: 'virtualserver_server'

concurrency:
  group: dependent-probe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  TF_VAR_suffix: ${{ github.run_id }}
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ secrets.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ secrets.SCP_ACCOUNT_ID }}

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: scp-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Bootstrap prerequisites (VPC / Subnet / Security Group)
        run: |
          terraform -chdir=bootstrap init -no-color -input=false
          terraform -chdir=bootstrap apply -no-color -input=false -auto-approve
          VPC_ID=$(terraform -chdir=bootstrap output -raw vpc_id)
          {
            echo "TF_VAR_vpc_id=$VPC_ID"
            echo "TF_VAR_subnet_id=$(terraform -chdir=bootstrap output -raw subnet_id)"
            echo "TF_VAR_security_group_id=$(terraform -chdir=bootstrap output -raw security_group_id)"
            echo "TF_VAR_ip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_publicip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_ip_address=$(terraform -chdir=bootstrap output -raw publicip_address)"
            echo "TF_VAR_keypair_name=$(terraform -chdir=bootstrap output -raw keypair_name)"
            echo "TF_VAR_image_id=$(terraform -chdir=bootstrap output -raw image_id)"
            echo "TF_VAR_server_type_id=s1v1m2"
            echo "TF_VAR_volume_id=$(terraform -chdir=bootstrap output -raw filestorage_volume_id)"
            echo "TF_VAR_kubernetes_version=$(terraform -chdir=bootstrap output -raw kubernetes_version)"
            echo "TF_VAR_security_group_id_list=[\"$(terraform -chdir=bootstrap output -raw security_group_id)\"]"
          } >> "$GITHUB_ENV"
          echo "bootstrap image_count=$(terraform -chdir=bootstrap output -raw image_count), image_id=$(terraform -chdir=bootstrap output -raw image_id)"
          echo "DIAG image: name=$(terraform -chdir=bootstrap output -raw diag_image_name) type=$(terraform -chdir=bootstrap output -raw diag_image_type) orig_type=$(terraform -chdir=bootstrap output -raw diag_image_original_type) visibility=$(terraform -chdir=bootstrap output -raw diag_image_visibility) os_version=$(terraform -chdir=bootstrap output -raw diag_image_os_version) min_disk=$(terraform -chdir=bootstrap output -raw diag_image_min_disk) id=$(terraform -chdir=bootstrap output -raw diag_image_id)"
          echo "SKE prereqs: filestorage_volume_id=$(terraform -chdir=bootstrap output -raw filestorage_volume_id) k8s_version=$(terraform -chdir=bootstrap output -raw kubernetes_version) k8s_version_count=$(terraform -chdir=bootstrap output -raw kubernetes_version_count)"
      - name: Run dependent capability matrix
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          # Default is a no-op token (matches no scenario) so a push to this
          # branch runs only bootstrap->teardown as a cheap smoke test. Use
          # workflow_dispatch `scenarios` (or the regression lane) to run real sets.
          MATRIX_SCENARIOS: ${{ github.event.inputs.scenarios || '__none__' }}
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 120m || true
          echo "## Dependent Probe" >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,40p' "$OUTPUT_DIR/capability-matrix.md" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
      - name: Post matrix summary to tracking issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_MARKER: "[capability] matrix failures"
        run: scripts/post_matrix_summary.sh out/capability-matrix.json
      - name: Update coverage dashboard
        if: always()
        # Merge this run's matrix into the persistent coverage store and
        # regenerate COVERAGE.md. We deliberately do NOT commit the result back:
        # this workflow triggers on push to scenarios/** etc., so committing
        # coverage/** from CI could create a push -> trigger loop. Instead we
        # surface COVERAGE.md to the step summary and upload coverage.json as an
        # artifact. The committed coverage/coverage.json is refreshed out-of-band
        # (the maintainer/seed runs build_coverage.py against downloaded artifacts
        # on the dashboard branch). Artifact + summary keeps CI side-effect-free.
        env:
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python3 scripts/build_coverage.py out/capability-matrix.json || true
          {
            echo "## Coverage dashboard"
            echo
            sed -n '1,30p' COVERAGE.md
          } >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: |
            coverage/coverage.json
            COVERAGE.md
          if-no-files-found: ignore
      - name: Teardown prerequisites
        if: always()
        run: terraform -chdir=bootstrap destroy -no-color -input=false -auto-approve || true
