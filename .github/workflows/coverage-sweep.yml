name: Coverage Sweep

# Parallel coverage expansion. Each matrix shard is an independent job that
# bootstraps its own VPC / subnet / security group / publicip / keypair /
# filestorage prereqs, runs the capability matrix over its shard of scenarios
# (validate -> plan -> apply -> replan -> destroy), prints the per-shard table,
# uploads the matrix JSON, and ALWAYS tears the prereqs down so nothing leaks.
#
# Deliberately excluded: baremetal, cloudmonitoring, configinspection, vertica
# (per request); plus LB-creating scenarios (provider #77 leaks a billed LB on
# destroy) and heavyweight managed clusters (cost/timeout) — those are handled
# separately. A per-shard go-test timeout caps any provider status-waiter hang
# (cf. #76) so a stuck scenario can't burn the whole job or leak.
#
# Triggered on demand (workflow_dispatch) or by pushing this file on claude/**.
on:
  workflow_dispatch: {}
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/coverage-sweep.yml'

concurrency:
  group: coverage-sweep-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  TF_VAR_suffix: ${{ github.run_id }}
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ secrets.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ secrets.SCP_ACCOUNT_ID }}

jobs:
  sweep:
    runs-on: ubuntu-latest
    environment: scp-integration
    timeout-minutes: 45
    # Per-shard unique suffix so each shard's bootstrap (and scenario) resource
    # names don't collide with sibling shards in the same run.
    env:
      TF_VAR_suffix: ${{ github.run_id }}${{ strategy.job-index }}
    strategy:
      fail-fast: false
      # SERIAL: the account has a hard 5-VPC quota. Running shards in parallel
      # (each bootstraps a VPC, some scenarios create more) exhausts it, so we
      # serialize to guarantee clean determinations without quota-collisions.
      max-parallel: 1
      matrix:
        # Sweep #3: cover everything still undetermined + the scenarios that were
        # quota-masked in Sweep #2 + the freshly re-fixed fixtures. dns_private_dns
        # stays out (provider #79 destroy leak). LB-creating scenarios are recorded
        # as blocked by #77 (not run — they leak a billed LB on destroy).
        shard:
          - "vpc_transit_gateway,vpc_subnet_vip,vpc_subnet_vip_port,vpc_subnet_vip_nat_ip,vpc_private_nat,vpc_private_nat_ip"
          - "vpc_transit_gateway_vpc_connection,vpc_transit_gateway_rule,vpc_transit_gateway_firewall,vpc_transit_gateway_firewall_connection,vpc_transit_gateway_uplink_rule"
          - "mysql_cluster,postgresql_cluster,mariadb_cluster,sqlserver_cluster,epas_cluster,searchengine_cluster,cachestore_cluster"
          - "ske_cluster,ske_nodepool"
          - "dns_hosted_zone,dns_record,servicewatch_log_stream,servicewatch_alert,loggingaudit_trail,backup_backup,virtualserver_volume,iam_role,iam_group_member,iam_role_policy_bindings,certificate_manager_self_sign"
          - "vpn_vpn_tunnel,directconnect_routing_rule,gslb_gslb,vpc_internet_gateway,vpc_vpc_peering,vpc_vpc_peering_approval,vpc_vpc_peering_rule"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Bootstrap prerequisites (VPC / Subnet / Security Group)
        run: |
          terraform -chdir=bootstrap init -no-color -input=false
          terraform -chdir=bootstrap apply -no-color -input=false -auto-approve
          {
            echo "TF_VAR_vpc_id=$(terraform -chdir=bootstrap output -raw vpc_id)"
            echo "TF_VAR_subnet_id=$(terraform -chdir=bootstrap output -raw subnet_id)"
            echo "TF_VAR_security_group_id=$(terraform -chdir=bootstrap output -raw security_group_id)"
            echo "TF_VAR_ip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_publicip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_ip_address=$(terraform -chdir=bootstrap output -raw publicip_address)"
            echo "TF_VAR_keypair_name=$(terraform -chdir=bootstrap output -raw keypair_name)"
            echo "TF_VAR_image_id=$(terraform -chdir=bootstrap output -raw image_id)"
            echo "TF_VAR_server_type_id=s1v1m2"
            echo "TF_VAR_volume_id=$(terraform -chdir=bootstrap output -raw filestorage_volume_id)"
            echo "TF_VAR_kubernetes_version=$(terraform -chdir=bootstrap output -raw kubernetes_version)"
            echo "TF_VAR_security_group_id_list=[\"$(terraform -chdir=bootstrap output -raw security_group_id)\"]"
            echo "TF_VAR_account_id=$SCP_ACCOUNT_ID"
            echo "TF_VAR_trusted_account_id=$SCP_ACCOUNT_ID"
          } >> "$GITHUB_ENV"
      - name: Run capability matrix for shard
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          MATRIX_SCENARIOS: ${{ matrix.shard }}
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 30m || true
          echo "===== capability matrix (this shard) ====="
          cat "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null || echo "(no matrix md produced)"
          {
            echo "## Coverage sweep shard"
            echo '```'
            sed -n '1,60p' "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
      - name: Upload shard matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-${{ strategy.job-index }}-${{ github.run_id }}
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
          if-no-files-found: ignore
      - name: Teardown prerequisites
        if: always()
        run: terraform -chdir=bootstrap destroy -no-color -input=false -auto-approve || true
