name: Cleanup Inventory

# Read-only: lists VPCs in the account so leaked test resources (regr*/rpv*/rps*)
# can be identified before any deletion. Triggered by pushing cleanup/ or this
# workflow on a claude/** branch, or manually.
on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'cleanup/**'
      - '.github/workflows/cleanup.yml'
  workflow_dispatch: {}

concurrency:
  group: cleanup-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ secrets.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ secrets.SCP_ACCOUNT_ID }}

jobs:
  inventory:
    runs-on: ubuntu-latest
    environment: scp-integration
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: List VPCs (read-only)
        run: |
          terraform -chdir=cleanup init -no-color -input=false
          terraform -chdir=cleanup apply -no-color -input=false -auto-approve
          echo "== ALL VPCs =="
          terraform -chdir=cleanup output -json all_vpcs
          echo "== TEST VPCs (regr*/rpv*/rps*) =="
          terraform -chdir=cleanup output -json test_vpcs
