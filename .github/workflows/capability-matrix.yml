name: Capability Matrix

# Runs the general "what works / what fails per stage" matrix across every
# scenario in integration mode (validate -> plan -> apply -> replan -> destroy),
# on a schedule and on demand. Failures are auto-filed as a tracking issue in
# this repo (via the capability-matrix.json -> results.json adapter), so the
# matrix is hands-off: look at the issue, not the logs.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode'
        type: choice
        options: [integration, dry-run]
        default: integration
      scenarios:
        description: 'Comma-separated scenarios to scope the run (blank = full 87-resource matrix)'
        required: false
        default: 'vpc_vpc,vpc_publicip,security_group_basic,virtualserver_keypair'
  # Push to a development branch triggers an on-demand integration matrix run.
  # Restricted to claude/** so normal branches don't spend cloud resources on
  # every push; the run still uses the scp-integration environment + secrets.
  push:
    branches:
      - 'claude/**'
    paths:
      - 'tests/**'
      - 'scenarios/**'
      - 'scripts/**'
      - '.github/workflows/capability-matrix.yml'
  schedule:
    # Daily at 06:00 UTC (15:00 KST) — offset from the 6-hourly integration job.
    - cron: '0 6 * * *'

# Only one matrix run per ref at a time; a newer push cancels an in-flight run
# so we don't stack concurrent integration lifecycles against the same account.
concurrency:
  group: capability-matrix-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  matrix:
    runs-on: ubuntu-latest
    environment: scp-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror (works even if the registry is blocked)
        run: scripts/setup_provider_mirror.sh
      - name: Build capability matrix
        env:
          MODE: ${{ github.event.inputs.mode || 'integration' }}
          OUTPUT_DIR: ${{ github.workspace }}/out
          # On-demand probes scope to a few resources so they finish in minutes:
          # a branch push uses the fixed 4-resource target; a manual dispatch uses
          # the `scenarios` input (defaults to the same 4). Scheduled runs leave it
          # empty and exercise the full 87-resource matrix.
          MATRIX_SCENARIOS: ${{ github.event_name == 'push' && 'vpc_vpc,vpc_publicip,security_group_basic,virtualserver_keypair' || github.event.inputs.scenarios }}
          SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
          SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
          SCP_TF_AUTH_URL:   ${{ secrets.SCP_TF_AUTH_URL }}
          SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
          SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
          SCP_ACCOUNT_ID:     ${{ secrets.SCP_ACCOUNT_ID }}
          TEST_VPC_ID:            ${{ secrets.TEST_VPC_ID }}
          TEST_SUBNET_ID:         ${{ secrets.TEST_SUBNET_ID }}
          TEST_SECURITY_GROUP_ID: ${{ secrets.TEST_SECURITY_GROUP_ID }}
          TEST_DBAAS_ENGINE_VERSION_ID: ${{ secrets.TEST_DBAAS_ENGINE_VERSION_ID }}
          TEST_SERVER_TYPE_NAME:        ${{ secrets.TEST_SERVER_TYPE_NAME }}
          TEST_GPUNODE_ID:              ${{ secrets.TEST_GPUNODE_ID }}
        run: |
          CAPABILITY_MATRIX=1 MODE="$MODE" OUTPUT_DIR="$OUTPUT_DIR" \
            go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 180m || true
          echo "## Capability Matrix ($MODE)" >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,40p' "$OUTPUT_DIR/capability-matrix.md" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
      - name: Upload matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capability-matrix
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
      - name: File matrix failures to a tracking issue
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_MARKER: "[capability] matrix failures"
        run: |
          scripts/matrix_to_results.sh out/capability-matrix.json out/results.json
          scripts/report_failures_to_issue.sh out/results.json
      - name: Post full matrix summary (on-demand probe observability)
        # On a branch-push probe, post the outcome for every stage (pass/blocked/
        # fail) so the result is visible from the tracking issue even when there
        # are zero failures. Scheduled/dispatch full runs keep failure-only filing.
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_MARKER: "[capability] matrix failures"
        run: scripts/post_matrix_summary.sh out/capability-matrix.json
