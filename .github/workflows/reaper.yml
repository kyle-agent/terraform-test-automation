name: Reaper

# Deletes a hard-coded list of leaked SCP resources by id using the provider's
# own SDK client wrappers (cmd/reaper). These resources cannot be removed via
# Terraform because the provider implements no ImportState (issue #81), so
# import+destroy is impossible. The reaper calls Delete*(ctx, id) directly.
#
# Does NOT need the Terraform provider mirror.
on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'cmd/reaper/**'
      - '.github/workflows/reaper.yml'
  workflow_dispatch: {}

concurrency:
  group: reaper-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ secrets.SCP_TF_AUTH_URL }}
  SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ secrets.SCP_ACCOUNT_ID }}
  GOFLAGS: -mod=mod
  # The SamsungSDSCloud SDK module is not served by the public Go proxy and
  # anonymous git fetches fail, so fetch it directly with a token (same approach
  # as the provider's own release workflow).
  GOPRIVATE: github.com/SamsungSDSCloud/terraform-sdk-samsungcloudplatformv2
  GH_ACCESS_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

jobs:
  reap:
    runs-on: ubuntu-latest
    environment: scp-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # The SCP provider module declares go 1.25; match it so the build works.
          go-version: '1.25'
      - name: Configure access token for private SDK module
        run: git config --global url.https://$GH_ACCESS_TOKEN@github.com/.insteadOf https://github.com/
      - name: Resolve module deps
        run: go mod tidy
      - name: Run reaper
        run: go run ./cmd/reaper
