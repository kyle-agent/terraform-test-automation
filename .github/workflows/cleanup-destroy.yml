name: Cleanup Destroy

# Imports the two leaked test VPCs (rpv26797061130 / rpv226797061130) by id and
# destroys them. Strictly scoped to those two ids — the pre-existing account VPC
# (demosvc1) is never referenced. Triggered by pushing cleanup_destroy/ or this
# workflow on a claude/** branch, or manually.
on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'cleanup_destroy/**'
      - '.github/workflows/cleanup-destroy.yml'
  workflow_dispatch: {}

concurrency:
  group: cleanup-destroy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ secrets.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ secrets.SCP_ACCOUNT_ID }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: scp-integration
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Import & destroy leaked VPCs
        run: |
          cd cleanup_destroy
          terraform init -no-color -input=false
          terraform import -no-color samsungcloudplatformv2_vpc_vpc.leak1 51c4583e294f466293eb15f6dee905cb || echo "import leak1 failed (already gone?)"
          terraform import -no-color samsungcloudplatformv2_vpc_vpc.leak2 16992f536f674ea8ac3e4c92d4c66e87 || echo "import leak2 failed (already gone?)"
          echo "== destroy =="
          terraform destroy -no-color -input=false -auto-approve
