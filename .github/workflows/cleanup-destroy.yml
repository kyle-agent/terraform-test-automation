name: Cleanup Destroy

# Imports the two leaked test VPCs (rpv26797061130 / rpv226797061130) by id and
# destroys them. Strictly scoped to those two ids — the pre-existing account VPC
# (demosvc1) is never referenced. Triggered by pushing cleanup_destroy/ or this
# workflow on a claude/** branch, or manually.
on:
  push:
    branches:
      - 'claude/**'
    paths:
      - 'cleanup_destroy/**'
      - '.github/workflows/cleanup-destroy.yml'
  workflow_dispatch: {}

concurrency:
  group: cleanup-destroy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ secrets.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ secrets.SCP_ACCOUNT_ID }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: scp-integration
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Import & destroy leaked VPCs
        run: |
          cd cleanup_destroy
          terraform init -no-color -input=false
          terraform import -no-color samsungcloudplatformv2_vpc_vpc.leak_lb   12fe48eb49d84badbafe07301798e228 || echo "import leak_lb failed (already gone?)"
          terraform import -no-color samsungcloudplatformv2_vpc_vpc.leak_hung 2ccff235ab6241508394422210e6364d || echo "import leak_hung failed (already gone?)"
          terraform import -no-color samsungcloudplatformv2_vpc_vpc.leak_iam  aad715dd6171489bbb64527902666c10 || echo "import leak_iam failed (already gone?)"
          terraform import -no-color samsungcloudplatformv2_vpc_vpc.leak_old  7e718685f29b42648958b4ab0d0abf7e || echo "import leak_old failed (already gone?)"
          echo "== destroy (best-effort; a VPC with leftover subnets/deps will report the blocker) =="
          terraform destroy -no-color -input=false -auto-approve || echo "destroy had blockers — see errors above for which VPCs still have dependents"
