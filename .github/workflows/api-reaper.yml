name: API Reaper

# Deletes leaked SCP resources by id via the Open API (HMAC auth), reusing the
# kyle-agent/api-test-automation framework (cloned at runtime). terraform can't
# delete these (provider implements no ImportState — issue #81); the Open API
# can, by id. Targets are a FIXED list in cmd/api_reaper/reap.py (never by name),
# so it cannot touch live resources. Triggered on demand or by pushing the
# reaper script / this workflow.
on:
  workflow_dispatch: {}
  # Manual only. The nightly cron was removed (no periodic runs on the dedicated
  # account); trigger a sweep by dispatching this workflow or by pushing the reaper
  # scripts below. Push sweeps run immediately (SWEEP_MIN_AGE_HOURS=0, SWEEP_ALL=1).
  push:
    branches:
      - 'claude/**'
    paths:
      # NOTE: deliberately not 'cmd/api_reaper/**' — inventory.py lives there too and is
      # read-only, so it must NOT trigger the (destructive) reaper. List the reaper's own
      # files explicitly.
      - 'cmd/api_reaper/sweep_all.py'
      - 'cmd/api_reaper/reap.py'
      - 'cmd/api_reaper/_client.py'
      - '.github/workflows/api-reaper.yml'

concurrency:
  group: api-reaper-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reap:
    runs-on: ubuntu-latest
    environment: scp-integration
    env:
      # The leaked resources are in kr-west1 / env "e" per the account inventory.
      SCP_REGION: kr-west1
      SCP_ENV: e
      SCP_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
      SCP_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
      SCP_ALLOW_MUTATIONS: 'true'
      SCP_ALLOW_DESTRUCTIVE: 'true'
      # On-demand/push sweeps reap immediately (age 0); the nightly schedule only
      # reaps leaks older than 2h to avoid racing an in-flight run.
      SWEEP_MIN_AGE_HOURS: ${{ github.event_name == 'schedule' && '2' || '0' }}
      # Dedicated single-tenant test account with no production resources: on manual /
      # push sweeps reap EVERYTHING (ignore the name allowlist). The nightly stays
      # allowlist-only as a conservative default.
      SWEEP_ALL: ${{ github.event_name == 'schedule' && '0' || '1' }}
      # Account guard: SWEEP_ALL only mass-deletes if the live account (from the access
      # key secret) matches this. Set from the configured account id; if it doesn't match
      # the secret's real account, SWEEP_ALL self-downgrades to safe prefix-only.
      EXPECTED_ACCOUNT_ID: ${{ vars.SCP_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Self-contained now: cmd/api_reaper/_client.py reimplements the HMAC client
      # (stdlib only), so the reaper no longer depends on cloning the external
      # api-test-automation repo (whose `framework` import broke this workflow).
      - name: Run API sweep (delete ALL test-created resources)
        run: python cmd/api_reaper/sweep_all.py
      # SCP Object Storage buckets live behind the S3 API, not the Open API, so the
      # sweep above can't see them. The network_logging fixture self-cleans its bucket
      # on destroy, but a mid-apply crash could leak one; this catches those. Same TTL
      # guard (SWEEP_MIN_AGE_HOURS) so a scheduled run can't race a live test.
      - name: Sweep leaked OBS buckets (S3-compatible)
        env:
          TF_VAR_obs_access_key: ${{ secrets.SCP_TF_ACCESS_KEY }}
          TF_VAR_obs_secret_key: ${{ secrets.SCP_TF_SECRET_KEY }}
          TF_VAR_obs_endpoint: https://object-store.kr-west1.e.samsungsdscloud.com
        run: |
          pip install --quiet boto3
          python scripts/obs_bucket.py sweep regrnetlog regr-obs-

