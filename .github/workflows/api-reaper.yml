name: API Reaper

# Deletes leaked SCP resources by id via the Open API (HMAC auth), reusing the
# kyle-agent/api-test-automation framework (cloned at runtime). terraform can't
# delete these (provider implements no ImportState — issue #81); the Open API
# can, by id. Targets are a FIXED list in cmd/api_reaper/reap.py (never by name),
# so it cannot touch live resources. Triggered on demand or by pushing the
# reaper script / this workflow.
on:
  workflow_dispatch: {}
  # Triggered 2026-06-17: reap leaked pool VPC rpv276783136630 (dns_hosted_zone/dns_record
  # destroy 409 left dns_private_dns attached -> bootstrap VPC teardown 409, run 27678313663).
  # Triggered 2026-06-18: reap any leaks from the released-v4.0.0 full sweep (run
  # 27724880374) -- v4 lacks our destroy fixes (#77 LB wait, dns #79/#93, vip_nat_ip) so
  # scenario destroys may have leaked LBs/dns/etc.
  # Triggered 2026-06-18 (b): VPC quota EXHAUSTED (5/5) — reap leaked rpv* VPCs from the
  # v4 sweep + peering partial-creates so pool/self lanes can bootstrap again.
  # Triggered 2026-06-19: reap TGW partial-creates from TGW Batch A apply-fail (run
  # 27799716751: firewall create 400 INACTIVE left TGWs/firewall_connections stranded;
  # TGW max=3 so clear them before any future TGW sweep). Peering ran clean (destroy_verify=ok).
  # Triggered 2026-06-19 (c): reap stranded TGW from the firewall-connection probe (run 27812898493:
  # connection create 400'd "needs a connected VPC" -> TGW left, no auto-destroy). TGW max=3, clear before retest.
  # Triggered 2026-06-20: reap-BEFORE the vpc_transit_gateway_firewall_connection retest. Run 27819033334
  # left TGW regr-tgwfwc51bf10 (984b8825) on a final-delete 400 (vpc-connection still settling) + VPCs
  # 225cc279/5b7e1937 on 409; clear the slate so the retest's verdict is trustworthy (TGW max=3).
  # Triggered 2026-06-20 (b): reap-AFTER the firewall_connection retest (sweep 27859964524). apply hit a
  # provider Value Conversion Error AFTER creating TGW+vpc_connection+firewall_connection; partial-create
  # cleanup 400'd ("Firewall Connection must be disconnected before VPC connections can be deleted") -> pool
  # VPC 42b72d76 (rpv278599645240) leaked on a 409. Reaper order (fw-conn -> vpc-conn -> TGW) clears it.
  # Triggered 2026-06-20 (c): reap-after PASS 2. Pass 1 (run 27860555251) ran ~6min post-apply and the
  # firewall connection was still settling: vpc-connection d47aa814 delete 400'd, TGW e50f2da4
  # (regr-tgwfwca0f3ea) 409'd, pool VPC 42b72d76 still pinned. Retry now that it has settled.
  # Triggered 2026-06-20 (d): reap-BEFORE the firewall_connection RE-retest after provider fix PR #99
  # (adds missing firewall_id to the nested schema -> fixes the Value Conversion Error). Clean slate +
  # another attempt to reclaim the still-stranded TGW e50f2da4 + pool VPC 42b72d76 (settling since 04:36).
  # Triggered 2026-06-20 (e): reap-BEFORE the #96-family cascade (vpc_private_nat + vpc_private_nat_ip,
  # 2 new TGWs). Confirm TGW count (cap=3) and free a slot from the stranded e50f2da4 if it has cleared.
  # Triggered 2026-06-19 (b): reap cachestore_cluster partial-create leak from run 27802519587
  # (apply failed "inconsistent result: sentinel_port 26379->26378" provider bug; scenario
  # cleanup destroy 500'd reading the server -> leaked cachestore cluster + maybe its subnet/VPC).
  # Manual only. The nightly cron was removed (no periodic runs on the dedicated
  # account); trigger a sweep by dispatching this workflow or by pushing the reaper
  # scripts below. Push sweeps run immediately (SWEEP_MIN_AGE_HOURS=0, SWEEP_ALL=1).
  push:
    branches:
      - 'claude/**'
    paths:
      # NOTE: deliberately not 'cmd/api_reaper/**' — inventory.py lives there too and is
      # read-only, so it must NOT trigger the (destructive) reaper. List the reaper's own
      # files explicitly.
      - 'cmd/api_reaper/sweep_all.py'
      - 'cmd/api_reaper/reap.py'
      - 'cmd/api_reaper/_client.py'
      - '.github/workflows/api-reaper.yml'

concurrency:
  group: api-reaper-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reap:
    runs-on: ubuntu-latest
    environment: scp-integration
    env:
      # The leaked resources are in kr-west1 / env "e" per the account inventory.
      SCP_REGION: kr-west1
      SCP_ENV: e
      SCP_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
      SCP_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
      SCP_ALLOW_MUTATIONS: 'true'
      SCP_ALLOW_DESTRUCTIVE: 'true'
      # On-demand/push sweeps reap immediately (age 0); the nightly schedule only
      # reaps leaks older than 2h to avoid racing an in-flight run.
      SWEEP_MIN_AGE_HOURS: ${{ github.event_name == 'schedule' && '2' || '0' }}
      # Dedicated single-tenant test account with no production resources: on manual /
      # push sweeps reap EVERYTHING (ignore the name allowlist). The nightly stays
      # allowlist-only as a conservative default.
      SWEEP_ALL: ${{ github.event_name == 'schedule' && '0' || '1' }}
      # Account guard: SWEEP_ALL only mass-deletes if the live account (from the access
      # key secret) matches this. Set from the configured account id; if it doesn't match
      # the secret's real account, SWEEP_ALL self-downgrades to safe prefix-only.
      EXPECTED_ACCOUNT_ID: ${{ vars.SCP_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Self-contained now: cmd/api_reaper/_client.py reimplements the HMAC client
      # (stdlib only), so the reaper no longer depends on cloning the external
      # api-test-automation repo (whose `framework` import broke this workflow).
      - name: Run API sweep (delete ALL test-created resources)
        run: python cmd/api_reaper/sweep_all.py
      # SCP Object Storage buckets live behind the S3 API, not the Open API, so the
      # sweep above can't see them. The network_logging fixture self-cleans its bucket
      # on destroy, but a mid-apply crash could leak one; this catches those. Same TTL
      # guard (SWEEP_MIN_AGE_HOURS) so a scheduled run can't race a live test.
      - name: Sweep leaked OBS buckets (S3-compatible)
        env:
          TF_VAR_obs_access_key: ${{ secrets.SCP_TF_ACCESS_KEY }}
          TF_VAR_obs_secret_key: ${{ secrets.SCP_TF_SECRET_KEY }}
          TF_VAR_obs_endpoint: https://object-store.kr-west1.e.samsungsdscloud.com
        run: |
          pip install --quiet boto3
          python scripts/obs_bucket.py sweep regrnetlog regr-obs-

