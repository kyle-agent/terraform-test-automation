name: Cost-Tiered Regression

# Cost-tiered regression lane: re-runs ONLY the known-green, low-cost scenarios
# (status==green AND cost in {free,cheap}, per coverage/cost_tiers.yaml, selected
# by scripts/select_regression.sh) on a nightly schedule and fails loudly if any
# of them is no longer fully green. Heavy resources (managed DB clusters, SKE,
# baremetal, large loadbalancers, etc.) are deliberately excluded to keep spend
# low. Reuses the dependent-probe bootstrap + capability-matrix steps and ALWAYS
# tears down its prerequisites so nothing leaks.

on:
  schedule:
    # 03:17 UTC nightly (off the top of the hour to dodge cron congestion).
    - cron: '17 3 * * *'
  workflow_dispatch: {}

concurrency:
  group: cost-tiered-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  TF_VAR_suffix: ${{ github.run_id }}
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ secrets.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ secrets.SCP_ACCOUNT_ID }}

jobs:
  regression:
    runs-on: ubuntu-latest
    environment: scp-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh

      - name: Select cost-tiered regression set (green + free/cheap)
        id: select
        run: |
          SET="$(scripts/select_regression.sh)"
          if [ -z "$SET" ]; then
            echo "select_regression.sh returned an empty set — nothing to run." >&2
            exit 1
          fi
          echo "Regression set: $SET"
          echo "scenarios=$SET" >> "$GITHUB_OUTPUT"

      - name: Bootstrap prerequisites (VPC / Subnet / Security Group)
        run: |
          terraform -chdir=bootstrap init -no-color -input=false
          terraform -chdir=bootstrap apply -no-color -input=false -auto-approve
          VPC_ID=$(terraform -chdir=bootstrap output -raw vpc_id)
          {
            echo "TF_VAR_vpc_id=$VPC_ID"
            echo "TF_VAR_subnet_id=$(terraform -chdir=bootstrap output -raw subnet_id)"
            echo "TF_VAR_security_group_id=$(terraform -chdir=bootstrap output -raw security_group_id)"
            echo "TF_VAR_ip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_publicip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_ip_address=$(terraform -chdir=bootstrap output -raw publicip_address)"
            echo "TF_VAR_keypair_name=$(terraform -chdir=bootstrap output -raw keypair_name)"
            echo "TF_VAR_image_id=$(terraform -chdir=bootstrap output -raw image_id)"
            echo "TF_VAR_server_type_id=s1v1m2"
            echo "TF_VAR_volume_id=$(terraform -chdir=bootstrap output -raw filestorage_volume_id)"
            echo "TF_VAR_kubernetes_version=$(terraform -chdir=bootstrap output -raw kubernetes_version)"
            echo "TF_VAR_security_group_id_list=[\"$(terraform -chdir=bootstrap output -raw security_group_id)\"]"
          } >> "$GITHUB_ENV"

      - name: Run cost-tiered capability matrix
        # Bound the matrix so a single stuck terraform apply/destroy can never
        # hang the lane: the go -timeout makes the test self-terminate (still
        # writing the partial matrix JSON), and timeout-minutes is a hard backstop
        # so the always() Post/Teardown/Fail-gate steps always run.
        timeout-minutes: 45
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          MATRIX_SCENARIOS: ${{ steps.select.outputs.scenarios }}
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 40m || true
          echo "## Cost-Tiered Regression" >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,40p' "$OUTPUT_DIR/capability-matrix.md" >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

      - name: Post matrix summary to tracking issue #13
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REGRESSION_SET: ${{ steps.select.outputs.scenarios }}
        run: |
          IN=out/capability-matrix.json
          REPO="${GITHUB_REPOSITORY}"
          RUN_URL="${GITHUB_SERVER_URL}/${REPO}/actions/runs/${GITHUB_RUN_ID}"
          if [ ! -f "$IN" ]; then
            echo "no matrix file: $IN — posting a failure note." >&2
            BODY=$(printf '## Cost-tiered regression — NO MATRIX OUTPUT\n\nRun: %s\n\nThe capability matrix produced no JSON (bootstrap or matrix step did not complete). Treat as a failed regression run.' "$RUN_URL")
            curl -sS -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/issues/13/comments" \
              -d "$(jq -n --arg b "$BODY" '{body:$b}')" >/dev/null || true
            exit 0
          fi
          # Write the jq filter to a file via a quoted heredoc so we never fight
          # YAML/shell escaping of the embedded jq string.
          cat > /tmp/regr_summary.jq <<'JQ'
          ( [ .[].stages | to_entries[] | .value ] ) as $all
          | "## Cost-tiered regression outcome",
            "",
            "Run: \($run)",
            "Set (green + free/cheap): `\($set)`",
            "",
            "Resources: \(length) · ok: \([$all[]|select(.=="ok")]|length) · fail: \([$all[]|select(.=="fail")]|length) · blocked: \([$all[]|select(.=="blocked")]|length) · skip: \([$all[]|select(.=="skip")]|length)",
            "",
            "| resource | validate | plan | apply | replan | destroy | note |",
            "|---|---|---|---|---|---|---|",
            ( .[]
              | "| `\(.resource // .scenario)` | \(.stages.validate // "-") | \(.stages.plan // "-") | \(.stages.apply // "-") | \(.stages.replan // "-") | \(.stages.destroy // "-") | \((.note // "")|gsub("\n";" ")|gsub("\\|";"\\\\|")) |" ),
            "",
            "_Auto-posted by .github/workflows/regression.yml (cost-tiered lane)._"
          JQ
          BODY=$(jq -r --arg run "$RUN_URL" --arg set "$REGRESSION_SET" -f /tmp/regr_summary.jq "$IN")
          curl -sS -X POST -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/13/comments" \
            -d "$(jq -n --arg b "$BODY" '{body:$b}')" >/dev/null
          echo "posted matrix summary to issue #13"

      - name: Teardown prerequisites
        if: always()
        run: terraform -chdir=bootstrap destroy -no-color -input=false -auto-approve || true

      - name: Fail loudly on any regression
        if: always()
        env:
          REGRESSION_SET: ${{ steps.select.outputs.scenarios }}
        run: |
          IN=out/capability-matrix.json
          if [ ! -f "$IN" ]; then
            echo "::error::No capability-matrix.json produced — regression run did not complete."
            exit 1
          fi
          # A scenario is a regression if it was in the selected set but either
          # is missing from the matrix output or has ANY stage == fail.
          python3 - "$IN" "$REGRESSION_SET" <<'PY'
          import json, sys
          matrix_path, sel = sys.argv[1], sys.argv[2]
          expected = [s for s in sel.split(",") if s.strip()]
          with open(matrix_path) as f:
              data = json.load(f)
          by_scenario = {r.get("scenario"): r for r in data}
          regressions = []
          for name in expected:
              r = by_scenario.get(name)
              if r is None:
                  regressions.append((name, "missing from matrix output"))
                  continue
              failed = [st for st, v in (r.get("stages") or {}).items() if v == "fail"]
              if failed:
                  regressions.append((name, "failed stages: " + ", ".join(sorted(failed))))
          if regressions:
              print("::error::Cost-tiered regression detected — known-green scenarios are no longer green:")
              for name, why in regressions:
                  print(f"::error::  {name}: {why}")
              sys.exit(1)
          print(f"All {len(expected)} cost-tiered scenarios are fully green. No regression.")
          PY
