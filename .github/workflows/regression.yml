name: Regression Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode (dry-run | integration)'
        required: true
        default: 'dry-run'
      chapter:
        description: 'Specific chapter (blank = all)'
        required: false
        default: ''

jobs:
  dry-run:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.mode == 'dry-run'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Run dry-run regression
        env:
          MODE: dry-run
        run: |
          if [ -n "${{ github.event.inputs.chapter }}" ]; then
            make test-chapter CH=${{ github.event.inputs.chapter }}
          else
            make test
          fi
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-dry-run
          path: out/

  integration:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'integration'
    runs-on: ubuntu-latest
    environment: scp-integration   # holds secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Run integration regression
        env:
          MODE: integration
          SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
          SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
          SCP_TF_AUTH_URL:   ${{ secrets.SCP_TF_AUTH_URL }}
          SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
          # Provider reads SCP_TF_DEFAULT_REGION per the registry docs; export
          # both from the same secret so either provider behavior works.
          SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
          SCP_ACCOUNT_ID:     ${{ secrets.SCP_ACCOUNT_ID }}
          TEST_SECURITY_GROUP_ID: ${{ secrets.TEST_SECURITY_GROUP_ID }}
          TEST_SUBNET_ID:         ${{ secrets.TEST_SUBNET_ID }}
          TEST_VPC_ID:            ${{ secrets.TEST_VPC_ID }}
          TEST_DBAAS_ENGINE_VERSION_ID: ${{ secrets.TEST_DBAAS_ENGINE_VERSION_ID }}
          TEST_SERVER_TYPE_NAME:        ${{ secrets.TEST_SERVER_TYPE_NAME }}
          TEST_GPUNODE_ID:              ${{ secrets.TEST_GPUNODE_ID }}
        run: |
          if [ -n "${{ github.event.inputs.chapter }}" ]; then
            make test-chapter CH=${{ github.event.inputs.chapter }}
          else
            make test
          fi
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-integration
          path: out/
      - name: Re-open regressed issues
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PROVIDER_REPO_GH_TOKEN }}
        run: scripts/publish_report.sh out/results.json
