name: Coverage Sweep Pool

# VPC-pool parallel coverage. Two lanes:
#  - novpc: VPC-independent products (iam/billing/budget/cert/servicewatch/dns/
#    resourcemanager). No bootstrap VPC at all, so zero VPC-quota pressure; runs
#    them concurrently (MATRIX_PARALLEL) in a single job.
#  - pool: VPC-dependent products. Each matrix shard is one job that bootstraps a
#    single VPC (a "pool member"; max-parallel 3 => 3 VPCs, under the 5-VPC quota)
#    and runs its shard's scenarios CONCURRENTLY within that one VPC
#    (MATRIX_PARALLEL). Always tears its prereqs down.
#
# Scenarios that create their OWN VPC (peering, self-contained internet_gateway,
# endpoint) and provider-blocked families (#76 TGW hang, #77 LB leak, #79 dns
# private destroy) are handled elsewhere / excluded.
#
# NOTE: push trigger intentionally omitted for now so committing this file does
# NOT auto-launch a pool sweep while Sweep #3 / the reaper are using the 5-VPC
# quota. Re-add a `push:` paths trigger (or dispatch) to launch it deliberately.
on:
  workflow_dispatch: {}
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/coverage-sweep-pool.yml'

concurrency:
  group: coverage-sweep-pool-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

env:
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ vars.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ vars.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ vars.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ vars.SCP_ACCOUNT_ID }}

jobs:
  # ---- Lane 1: VPC-independent products, no bootstrap, high parallelism ----
  novpc:
    runs-on: ubuntu-latest
    environment: scp-integration
    timeout-minutes: 40
    env:
      TF_VAR_suffix: ${{ github.run_id }}9
      TF_VAR_account_id: ${{ vars.SCP_ACCOUNT_ID }}
      TF_VAR_trusted_account_id: ${{ vars.SCP_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Run VPC-independent products in parallel
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          MATRIX_PARALLEL: '6'
          MATRIX_SCENARIOS: "iam_policy,iam_group,iam_group_member,iam_group_policy_bindings,iam_role,iam_role_policy_bindings,iam_user,iam_user_policy_bindings,resourcemanager_resource_group,certificate_manager,certificate_manager_self_sign,servicewatch_dashboard,servicewatch_event_rule,servicewatch_log_group,servicewatch_log_stream,servicewatch_alert,loggingaudit_trail,budget_budget,billing_planned_compute,dns_hosted_zone,dns_record"
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 35m || true
          echo "===== capability matrix (novpc) ====="
          cat "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null || echo "(no matrix md produced)"
      - name: Upload novpc matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poolsweep-novpc-${{ github.run_id }}
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
          if-no-files-found: ignore

  # ---- Lane 2: VPC-dependent products, one bootstrap VPC per shard ----
  pool:
    runs-on: ubuntu-latest
    environment: scp-integration
    timeout-minutes: 75
    env:
      TF_VAR_suffix: ${{ github.run_id }}${{ strategy.job-index }}
      TF_VAR_account_id: ${{ vars.SCP_ACCOUNT_ID }}
      TF_VAR_trusted_account_id: ${{ vars.SCP_ACCOUNT_ID }}
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        shard:
          # vpc1 — network resources on the shared VPC (subnet/cidr/vip creators -> low parallel)
          - "vpc_port,vpc_nat_gateway,security_group_basic,securitygroup_rule_basic,firewall_firewall_rule,network_logging_network_logging_storage,vpc_subnet,vpc_cidr,vpc_subnet_vip,vpc_subnet_vip_port,vpc_subnet_vip_nat_ip"
          # vpc2 — compute / storage / network-edge
          # NOTE: self-contained-VPC scenarios (vpn_*) were MOVED OUT to the
          # `selfvpc` lane below — each makes its own VPC, so running them here
          # pushed the shard past the 5-VPC quota and starved the bootstrap
          # (DBaaS results got masked by quota-exhaustion, not real failures).
          - "virtualserver_keypair,virtualserver_server,virtualserver_server_group,virtualserver_volume,virtualserver_image,filestorage_volume,filestorage_snapshot_schedule,filestorage_replication,backup_backup,directconnect_direct_connect,directconnect_routing_rule,gslb_gslb"
          # DBaaS clusters — ONE engine per shard. The provider waits for ACTIVE on
          # create (~15-20m) and waits out delete (~10-15m), so a cluster is ~30m
          # round-trip; isolating one per shard keeps each well under the 50m test
          # timeout (5-in-one-shard would time out mid-destroy and leak). The probe
          # confirmed these 5 engines' values are valid and the API auto-assigns the
          # service IP on a fresh subnet (which the bootstrap provides).
          - "mysql_cluster"
          - "postgresql_cluster"
          - "mariadb_cluster"
          - "epas_cluster"
          - "cachestore_cluster"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Bootstrap pool VPC + prereqs
        run: |
          terraform -chdir=bootstrap init -no-color -input=false
          terraform -chdir=bootstrap apply -no-color -input=false -auto-approve
          {
            echo "TF_VAR_vpc_id=$(terraform -chdir=bootstrap output -raw vpc_id)"
            echo "TF_VAR_subnet_id=$(terraform -chdir=bootstrap output -raw subnet_id)"
            echo "TF_VAR_security_group_id=$(terraform -chdir=bootstrap output -raw security_group_id)"
            echo "TF_VAR_ip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_publicip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_ip_address=$(terraform -chdir=bootstrap output -raw publicip_address)"
            echo "TF_VAR_keypair_name=$(terraform -chdir=bootstrap output -raw keypair_name)"
            echo "TF_VAR_image_id=$(terraform -chdir=bootstrap output -raw image_id)"
            echo "TF_VAR_server_type_id=s1v1m2"
            echo "TF_VAR_volume_id=$(terraform -chdir=bootstrap output -raw filestorage_volume_id)"
            echo "TF_VAR_kubernetes_version=$(terraform -chdir=bootstrap output -raw kubernetes_version)"
            echo "TF_VAR_security_group_id_list=[\"$(terraform -chdir=bootstrap output -raw security_group_id)\"]"
          } >> "$GITHUB_ENV"
      - name: Run shard products in parallel within the pool VPC
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          # subnet/cidr creators + heavy clusters get parallelism 2 (CIDR contention /
          # slow async creates); the rest run at 4.
          MATRIX_PARALLEL: ${{ (contains(matrix.shard, 'vpc_subnet') || contains(matrix.shard, 'cluster') || contains(matrix.shard, 'ske')) && '2' || '4' }}
          MATRIX_SCENARIOS: ${{ matrix.shard }}
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 60m || true
          echo "===== capability matrix (pool shard) ====="
          cat "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null || echo "(no matrix md produced)"
      - name: Upload pool shard matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poolsweep-${{ strategy.job-index }}-${{ github.run_id }}
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
          if-no-files-found: ignore
      - name: Teardown pool VPC + prereqs
        if: always()
        run: terraform -chdir=bootstrap destroy -no-color -input=false -auto-approve || true

  # ---- Lane 3: scenarios that create their OWN VPC, run AFTER the pool ----
  # Each of these bootstraps its own VPC inside the fixture (vpn gateway/tunnel,
  # self-contained internet gateway, endpoint, peering). Running them concurrently
  # with the 3 pool VPCs blew the 5-VPC quota, so this lane `needs: pool` (the
  # pool's 3 VPCs are torn down first) and runs at low parallelism. No bootstrap
  # step here — the fixtures own their VPC lifecycle and tear it down themselves.
  selfvpc:
    needs: pool
    runs-on: ubuntu-latest
    environment: scp-integration
    timeout-minutes: 50
    env:
      TF_VAR_suffix: ${{ github.run_id }}8
      TF_VAR_account_id: ${{ vars.SCP_ACCOUNT_ID }}
      TF_VAR_trusted_account_id: ${{ vars.SCP_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Run self-contained-VPC scenarios (low parallel, post-pool)
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          # each makes >=1 VPC; cap at 2 concurrent to stay under the 5-VPC quota
          MATRIX_PARALLEL: '2'
          MATRIX_SCENARIOS: "vpn_vpn_gateway,vpn_vpn_tunnel,vpc_internet_gateway,vpc_vpc_endpoint,vpc_vpc_peering"
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 45m || true
          echo "===== capability matrix (selfvpc) ====="
          cat "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null || echo "(no matrix md produced)"
      - name: Upload selfvpc matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poolsweep-selfvpc-${{ github.run_id }}
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
          if-no-files-found: ignore

