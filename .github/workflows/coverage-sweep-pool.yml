name: Coverage Sweep Pool

# VPC-pool parallel coverage, DATA-DRIVEN from coverage/registry.yaml.
# A `plan` job runs scripts/plan_matrix.py to derive the lanes/shards (no more
# hand-maintained comma-strings); the three lanes consume its output:
#   - novpc : registry vpc==none  -> one high-parallel job, no bootstrap VPC.
#   - pool  : registry vpc==pool  -> one bootstrap VPC per shard (max-parallel caps
#             concurrent VPCs under the 5-VPC quota). slow(cluster) scenarios get
#             their own shard; CIDR-mutators get a low-parallel shard.
#   - selfvpc: registry vpc==self -> scenarios that make their own VPC; runs AFTER
#             pool (quota) at low parallelism.
# Selection is controlled by SELECT_STATUS / SELECT_VPC / SELECT_FAMILY (workflow
# inputs); push defaults to green+untested (skips known-broken and excluded).
on:
  # No cron (no periodic runs on the dedicated account). Two manual ways to run:
  #  - workflow_dispatch from the Actions UI (pick status/lane/family), or
  #  - a deliberate push to coverage/registry.yaml etc. on a claude/** branch while
  #    actively expanding coverage. push -> SELECT_STATUS='untested' (discovery).
  workflow_dispatch:
    inputs:
      select_status:
        description: 'comma statuses to run (green,broken,untested)'
        default: 'green,untested'
      select_vpc:
        description: 'comma lanes to include (none,pool,self)'
        default: 'none,pool,self'
      select_family:
        description: 'optional comma families filter (blank = all)'
        default: ''
  push:
    branches:
      - 'claude/**'
    paths:
      - '.github/workflows/coverage-sweep-pool.yml'
      - 'coverage/registry.yaml'
      - 'coverage/provider_surface.json'
      - 'scenarios/**'
      - 'scripts/plan_matrix.py'

concurrency:
  group: coverage-sweep-pool-${{ github.ref }}
  # NOT cancel-in-progress: a cancelled run can be killed mid-bootstrap before its
  # `if: always()` teardown completes, leaking a bootstrap VPC that then exhausts
  # the 5-VPC quota for the next run. Let runs queue instead of cancelling.
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
  SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
  SCP_TF_AUTH_URL: ${{ vars.SCP_TF_AUTH_URL }}
  SCP_DEFAULT_REGION: ${{ vars.SCP_DEFAULT_REGION }}
  SCP_TF_DEFAULT_REGION: ${{ vars.SCP_DEFAULT_REGION }}
  SCP_ACCOUNT_ID: ${{ vars.SCP_ACCOUNT_ID }}
  # Build the PATCHED provider from the fork (vendored SDK) instead of downloading the
  # released binary, so provider fixes (e.g. #77 loadbalancer wait-for-ACTIVE) are tested
  # end-to-end. setup_provider_mirror.sh clones + `go build`s into the mirror.
  SCP_PROVIDER_SOURCE_BUILD: '1'
  # fork main now carries this session's fixes (#54/#56/#78/#80) + #61/#88/#89
  # (merged via PR #91), so build from main again.
  SCP_PROVIDER_BUILD_REF: main

jobs:
  # ---- Derive the execution plan from registry.yaml ----
  plan:
    runs-on: ubuntu-latest
    outputs:
      novpc: ${{ steps.plan.outputs.novpc }}
      selfvpc: ${{ steps.plan.outputs.selfvpc }}
      pool: ${{ steps.plan.outputs.pool }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml
      - name: Validate registry
        run: python scripts/validate_registry.py
      - name: Derive matrix from registry
        id: plan
        env:
          # push -> 'untested' (discover unknowns, cheap: no known-green clusters);
          # schedule -> 'green' (regression); dispatch -> input (default green,untested).
          SELECT_STATUS: ${{ github.event.inputs.select_status || (github.event_name == 'schedule' && 'green' || github.event_name == 'push' && 'untested' || 'green,untested') }}
          SELECT_VPC: ${{ github.event.inputs.select_vpc || 'none,pool,self' }}
          SELECT_FAMILY: ${{ github.event.inputs.select_family || '' }}
        run: |
          python scripts/plan_matrix.py --github
          echo "----- derived plan -----"
          python scripts/plan_matrix.py

  # ---- Lane 1: VPC-independent products, no bootstrap, high parallelism ----
  novpc:
    needs: plan
    if: ${{ needs.plan.outputs.novpc != '' }}
    runs-on: ubuntu-latest
    environment: scp-integration
    timeout-minutes: 40
    env:
      TF_VAR_suffix: ${{ github.run_id }}9
      TF_VAR_account_id: ${{ vars.SCP_ACCOUNT_ID }}
      TF_VAR_trusted_account_id: ${{ vars.SCP_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Prepare OBS S3 client + sweep stale buckets
        # The network_logging fixture creates its OBS bucket via scripts/obs_bucket.py
        # (boto3) in a terraform_data local-exec -- aws_s3_bucket can't read OBS. Make
        # boto3 available, export the script path so the test's local-exec children find
        # it, and pre-sweep any buckets leaked by an earlier failed apply/destroy.
        env:
          TF_VAR_obs_access_key: ${{ secrets.SCP_TF_ACCESS_KEY }}
          TF_VAR_obs_secret_key: ${{ secrets.SCP_TF_SECRET_KEY }}
          TF_VAR_obs_endpoint: https://object-store.kr-west1.e.samsungsdscloud.com
        run: |
          pip install --quiet boto3
          echo "OBS_BUCKET_SCRIPT=${{ github.workspace }}/scripts/obs_bucket.py" >> "$GITHUB_ENV"
          python3 "${{ github.workspace }}/scripts/obs_bucket.py" sweep regrnetlog regr-obs- || true
      - name: Stage CirrOS image in OBS for virtualserver_image
        # Only when the novpc set actually includes virtualserver_image. Best-effort:
        # download a tiny CirrOS qcow2, upload it to OBS public-read, and export its
        # public URL as TF_VAR_image_url so the fixture registers a REAL image. If the
        # upload fails, the fixture keeps its offline dummy URL (|| true).
        # Platform import checks so far (probe iterations): URL must end .qcow2 (fixed
        # via --key) and os_distro must be in the allow-list e.g. ubuntu (fixed in fixture).
        if: contains(needs.plan.outputs.novpc, 'virtualserver_image')
        env:
          TF_VAR_obs_access_key: ${{ secrets.SCP_TF_ACCESS_KEY }}
          TF_VAR_obs_secret_key: ${{ secrets.SCP_TF_SECRET_KEY }}
          TF_VAR_obs_endpoint: https://object-store.kr-west1.e.samsungsdscloud.com
        run: |
          pip install --quiet boto3
          # Capture first; only export if the helper actually printed a URL, so a
          # failed upload leaves the fixture's offline dummy default in place.
          # NOTE: the platform image import REQUIRES the URL to end with '.qcow2'
          # (run 27124172026: 400 "URL must end with '.qcow2'"). CirrOS's .img IS a
          # qcow2, so upload it under a .qcow2 object key to satisfy the suffix check.
          # Upload the object (its printed URL is ignored; SCP OBS needs the account-namespaced
          # path form below). --bucket is the plain S3 bucket name for the boto3 upload.
          url="$(python3 "${{ github.workspace }}/scripts/upload_image_to_obs.py" \
            --source-url https://download.cirros-cloud.net/0.6.2/cirros-0.6.2-x86_64-disk.img \
            --key cirros-0.6.2-x86_64-disk.qcow2 \
            --bucket terraform-vmimage-test \
            --url-style path)" || true
          if [ -n "$url" ]; then
            # SCP OBS addresses a bucket in the path as {account_id}:{bucket} (operator-confirmed).
            # The image-import service fetches this account-namespaced public object URL.
            echo "TF_VAR_image_url=${TF_VAR_obs_endpoint}/${SCP_ACCOUNT_ID}:terraform-vmimage-test/cirros-0.6.2-x86_64-disk.qcow2" >> "$GITHUB_ENV"
          else
            echo "image staging failed; keeping offline dummy image_url" >&2
          fi
      - name: Run VPC-independent products in parallel
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          DESTROY_VERIFY: '1'
          MATRIX_PARALLEL: '6'
          MATRIX_SCENARIOS: ${{ needs.plan.outputs.novpc }}
          # OBS S3 creds/endpoint for the network_logging boto3 bucket lifecycle
          # (read by scripts/obs_bucket.py from the env it inherits via local-exec).
          TF_VAR_obs_access_key: ${{ secrets.SCP_TF_ACCESS_KEY }}
          TF_VAR_obs_secret_key: ${{ secrets.SCP_TF_SECRET_KEY }}
          TF_VAR_obs_endpoint: https://object-store.kr-west1.e.samsungsdscloud.com
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 35m || true
          echo "===== capability matrix (novpc) ====="
          cat "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null || echo "(no matrix md produced)"
      - name: Upload novpc matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poolsweep-novpc-${{ github.run_id }}
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
          if-no-files-found: ignore

  # ---- Lane 2: VPC-dependent products, one bootstrap VPC per shard ----
  pool:
    needs: plan
    if: ${{ needs.plan.outputs.pool != '[]' }}
    runs-on: ubuntu-latest
    environment: scp-integration
    timeout-minutes: 75
    name: pool (${{ matrix.shard.label }})
    env:
      TF_VAR_suffix: ${{ github.run_id }}${{ strategy.job-index }}
      TF_VAR_account_id: ${{ vars.SCP_ACCOUNT_ID }}
      TF_VAR_trusted_account_id: ${{ vars.SCP_ACCOUNT_ID }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        shard: ${{ fromJson(needs.plan.outputs.pool) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Bootstrap pool VPC + prereqs
        run: |
          terraform -chdir=bootstrap init -no-color -input=false
          terraform -chdir=bootstrap apply -no-color -input=false -auto-approve
          {
            echo "TF_VAR_vpc_id=$(terraform -chdir=bootstrap output -raw vpc_id)"
            echo "TF_VAR_subnet_id=$(terraform -chdir=bootstrap output -raw subnet_id)"
            echo "TF_VAR_security_group_id=$(terraform -chdir=bootstrap output -raw security_group_id)"
            echo "TF_VAR_ip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_publicip_id=$(terraform -chdir=bootstrap output -raw publicip_id)"
            echo "TF_VAR_ip_address=$(terraform -chdir=bootstrap output -raw publicip_address)"
            echo "TF_VAR_keypair_name=$(terraform -chdir=bootstrap output -raw keypair_name)"
            echo "TF_VAR_image_id=$(terraform -chdir=bootstrap output -raw image_id)"
            echo "TF_VAR_server_type_id=s1v1m2"
            echo "TF_VAR_volume_id=$(terraform -chdir=bootstrap output -raw filestorage_volume_id)"
            echo "TF_VAR_kubernetes_version=$(terraform -chdir=bootstrap output -raw kubernetes_version)"
            echo "TF_VAR_security_group_id_list=[\"$(terraform -chdir=bootstrap output -raw security_group_id)\"]"
          } >> "$GITHUB_ENV"
      - name: Run shard products within the pool VPC
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          DESTROY_VERIFY: '1'
          MATRIX_PARALLEL: ${{ matrix.shard.parallel }}
          MATRIX_SCENARIOS: ${{ matrix.shard.scenarios }}
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 60m || true
          echo "===== capability matrix (pool: ${{ matrix.shard.label }}) ====="
          cat "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null || echo "(no matrix md produced)"
      - name: Upload pool shard matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poolsweep-${{ matrix.shard.label }}-${{ github.run_id }}
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
          if-no-files-found: ignore
      - name: Teardown pool VPC + prereqs
        if: always()
        run: terraform -chdir=bootstrap destroy -no-color -input=false -auto-approve || true

  # ---- Lane 3: scenarios that create their OWN VPC, run AFTER the pool ----
  selfvpc:
    needs: [plan, pool]
    if: ${{ !cancelled() && needs.plan.outputs.selfvpc != '' }}
    runs-on: ubuntu-latest
    environment: scp-integration
    timeout-minutes: 50
    env:
      TF_VAR_suffix: ${{ github.run_id }}8
      TF_VAR_account_id: ${{ vars.SCP_ACCOUNT_ID }}
      TF_VAR_trusted_account_id: ${{ vars.SCP_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror
        run: scripts/setup_provider_mirror.sh
      - name: Run self-contained-VPC scenarios (low parallel, post-pool)
        env:
          MODE: integration
          OUTPUT_DIR: ${{ github.workspace }}/out
          CAPABILITY_MATRIX: '1'
          DESTROY_VERIFY: '1'
          MATRIX_PARALLEL: '1'
          MATRIX_SCENARIOS: ${{ needs.plan.outputs.selfvpc }}
        run: |
          go test ./tests/capability/... -run TestCapabilityMatrix -count=1 -timeout 45m || true
          echo "===== capability matrix (selfvpc) ====="
          cat "$OUTPUT_DIR/capability-matrix.md" 2>/dev/null || echo "(no matrix md produced)"
      - name: Upload selfvpc matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poolsweep-selfvpc-${{ github.run_id }}
          path: |
            out/capability-matrix.json
            out/capability-matrix.md
          if-no-files-found: ignore

# re-run 2026-06-06T13:45Z: network_logging OBS bucket via boto3 local-exec (aws_s3_bucket read incompatible w/ OBS)
