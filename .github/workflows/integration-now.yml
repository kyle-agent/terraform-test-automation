name: Integration (manual trigger via push)

# TEMPORARY workflow: runs the full integration suite when this branch is
# pushed, because the GitHub MCP tooling cannot dispatch workflow_dispatch.
# It is identical in substance to the Nightly Integration job (real cloud
# resources, scp-integration secrets, provider mirror to bypass a blocked
# registry). Delete this file / branch after the run.
on:
  push:
    branches: [claude/run-integration-now]

jobs:
  integration:
    runs-on: ubuntu-latest
    environment: scp-integration
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.6'
          terraform_wrapper: false
      - name: Set up provider mirror (works even if the registry is blocked)
        run: scripts/setup_provider_mirror.sh
      - name: Run full integration regression
        env:
          MODE: integration
          SCP_TF_ACCESS_KEY: ${{ secrets.SCP_TF_ACCESS_KEY }}
          SCP_TF_SECRET_KEY: ${{ secrets.SCP_TF_SECRET_KEY }}
          SCP_TF_AUTH_URL:   ${{ secrets.SCP_TF_AUTH_URL }}
          SCP_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
          SCP_TF_DEFAULT_REGION: ${{ secrets.SCP_DEFAULT_REGION }}
          SCP_ACCOUNT_ID:     ${{ secrets.SCP_ACCOUNT_ID }}
          TEST_VPC_ID:            ${{ secrets.TEST_VPC_ID }}
          TEST_SUBNET_ID:         ${{ secrets.TEST_SUBNET_ID }}
          TEST_SECURITY_GROUP_ID: ${{ secrets.TEST_SECURITY_GROUP_ID }}
          TEST_DBAAS_ENGINE_VERSION_ID: ${{ secrets.TEST_DBAAS_ENGINE_VERSION_ID }}
          TEST_SERVER_TYPE_NAME:        ${{ secrets.TEST_SERVER_TYPE_NAME }}
          TEST_GPUNODE_ID:              ${{ secrets.TEST_GPUNODE_ID }}
        run: make test MODE=integration
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-now-results
          path: out/
      - name: File failures to a tracking issue in this repo
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/report_failures_to_issue.sh out/results.json
      - name: Re-open regressed provider issues
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.PROVIDER_REPO_GH_TOKEN }}
        run: scripts/publish_report.sh out/results.json
